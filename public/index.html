<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS2526-27 | Data Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            padding: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2.1rem; /* Un pelín más pequeño que el original */
            margin: 0 0 5px 0;
            letter-spacing: -0.8px;
        }

        .presentation {
            font-size: 1rem;
            color: var(--text-muted);
            margin: 0;
        }

        .about-section {
            background: #eff6ff;
            padding: 12px 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
            border: 1px solid #dbeafe;
        }

        .about-section h3 { font-size: 1.1rem; margin: 0 0 3px 0; color: var(--primary); }
        .about-section p { font-size: 0.9rem; margin: 0 0 5px 0; }

        .api-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .api-card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .api-card:hover { transform: translateY(-3px); }

        .api-card h3 {
            margin: 0 0 8px 0;
            font-size: 1.15rem;
            line-height: 1.3;
        }

        .developer {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-style: italic;
        }

        .btn-group {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn {
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #f1f5f9; color: var(--text-main); }
        .btn-secondary:hover { background: #e2e8f0; }

        footer {
            margin-top: 35px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        @media (max-width: 900px) {
            .api-grid { grid-template-columns: 1fr; }
            body { align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SOS2526-27</h1>
        <p class="presentation">Plataforma de análisis de recursos hídricos y energía hidroeléctrica global.</p>
    </header>

    <div class="about-section">
        <h3>Información del Proyecto</h3>
        <p>Conoce más sobre nuestro equipo y el desarrollo del proyecto aquí:</p>
        <a href="/about" style="color: var(--primary); font-weight: 600; text-decoration: none; font-size: 0.9rem;">Ver Sección About &rarr;</a>
    </div>

    <div class="api-grid">
        <div class="api-card">
            <h3>Drinking Water Services</h3>
            <p class="developer">Developed by Alejandro Campos Sánchez-Cruzado</
