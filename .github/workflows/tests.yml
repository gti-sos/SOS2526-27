name: SOS Integration Tests
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      
      image: mcr.microsoft.com/playwright:v1.59.1-jammy

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd src/front && npm install --legacy-peer-deps

      - name: Run API tests
        run: npm test

      - name: Run Playwright tests
        run: |
          npm start &
          # Esperamos hasta 2 minutos a que el puerto 10000 responda
          npx wait-on http://localhost:10000 --timeout 120000
          npx playwright test