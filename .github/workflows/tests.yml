name: SOS Integration Tests
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    # Cambiamos a 'jammy', que es la versión estándar más compatible
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd src/front && npm install --legacy-peer-deps

      - name: Run API tests
        run: npm test

      - name: Run Playwright tests
        run: |
          npm start &
          # Esperamos un poco a que el server arranque antes de lanzar los tests
          sleep 5
          npx playwright test

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30