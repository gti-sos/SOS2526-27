name: SOS Integration Tests
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    # Contenedor oficial de Playwright para evitar descargas largas
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd src/front && npm install --legacy-peer-deps

      - name: Run API tests
        run: npm test

      - name: Run Playwright tests
        # Unificamos el arranque y el test en un solo bloque 'run'
        run: |
          npm start &
          npx playwright test

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30