name: SOS Integration Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install root dependencies
        # Forzamos la resolución de conflictos de versiones
        run: npm install --legacy-peer-deps

      - name: Install frontend dependencies
        # Entramos en la carpeta del front para instalar sus librerías también
        run: |
          cd src/front
          npm install --legacy-peer-deps

      - name: Run all tests
        # Ejecuta el script que configuramos (start-server-and-test + newman)
        run: npm test
        
      - name: Run server for e2e tests
        run: npm start &  

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30